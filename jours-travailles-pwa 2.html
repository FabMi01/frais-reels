<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Frais Réels" />
  <title>Frais Réels</title>
  <link rel="manifest" id="pwa-manifest" />
  <meta name="theme-color" content="#0f0f13" />
  <link rel="apple-touch-icon" id="apple-icon" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Thème sombre (défaut) ── */
    :root {
      --bg:       #0f0f13;
      --bg2:      #16161e;
      --bg3:      #1a1a22;
      --bg4:      #1e2030;
      --border:   #2a2a38;
      --border2:  #2a2a44;
      --text:     #e8e0d0;
      --text2:    #888;
      --text3:    #aaa;
      --text4:    #666;
      --gold:     #c8a96e;
      --gold-dim: #c8a96e22;
      --gold-dim2:#c8a96e44;
      --summary-bg: #0f0f13;
      --divider:  #2a2a38;
      --toggle-off: #2a2a38;
      --inner-bg: #1a1a28;
      --footer:   #333;
      --h1:       #f0e8d8;
      --sub:      #555;
    }
    /* ── Thème clair ── */
    [data-theme="light"] {
      --bg:       #f4f1eb;
      --bg2:      #ffffff;
      --bg3:      #f0ede6;
      --bg4:      #e8e4dc;
      --border:   #ddd8cc;
      --border2:  #d0cbbe;
      --text:     #1a1610;
      --text2:    #777;
      --text3:    #555;
      --text4:    #999;
      --gold:     #a07838;
      --gold-dim: #a0783818;
      --gold-dim2:#a0783830;
      --summary-bg: #faf8f4;
      --divider:  #e0dbd0;
      --toggle-off: #ccc;
      --inner-bg: #f0ede6;
      --footer:   #bbb;
      --h1:       #1a1610;
      --sub:      #999;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: "Georgia", serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }
    input[type=number], input[type=date], select, input[type=text] {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 16px;
      width: 100%;
      font-family: "Georgia", serif;
      outline: none;
      transition: border 0.2s;
      -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: var(--gold); }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      transition: background 0.3s, border-color 0.3s;
    }
    .label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 6px;
      display: block;
    }
    .result-num {
      font-size: 42px;
      font-weight: bold;
      color: var(--gold);
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .result-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-family: "Georgia", serif;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      width: 100%;
    }
    .btn-gold { background: var(--gold); color: var(--bg); font-weight: bold; }
    .btn-gold:active { filter: brightness(1.1); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text3); }
    .btn-outline:active { border-color: var(--gold); color: var(--gold); }
    .btn-danger {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text3);
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: "Georgia", serif;
    }
    .btn-danger:active { border-color: #a44; color: #f88; }
    .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      flex: 1;
      padding: 12px 8px;
      border-radius: 12px;
      font-family: "Georgia", serif;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text4);
      text-align: center;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
    .summary-box {
      background: var(--summary-bg);
      border: 1px solid var(--gold-dim2);
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.9;
      color: var(--text);
    }
    .tag {
      display: inline-block;
      background: var(--bg4);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      color: var(--text3);
      margin: 2px;
    }
    .section-title { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .divider { height: 1px; background: var(--divider); margin: 16px 0; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
    .toggle-label { font-size: 14px; color: var(--text3); }
    .toggle {
      width: 44px; height: 26px; border-radius: 13px;
      background: var(--toggle-off);
      position: relative; cursor: pointer;
      transition: background 0.2s; border: none;
      -webkit-tap-highlight-color: transparent; flex-shrink: 0;
    }
    .toggle.on { background: var(--gold); }
    .toggle::after {
      content: ""; position: absolute;
      width: 20px; height: 20px; border-radius: 50%;
      background: white; top: 3px; left: 3px;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(18px); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .animate { animation: fadeIn 0.3s ease; }
    .footer { text-align: center; font-size: 11px; color: var(--footer); margin-top: 8px; padding-bottom: 24px; }

    /* Bouton thème */
    .theme-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text3);
      font-family: "Georgia", serif;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
    }
    .theme-btn:active { border-color: var(--gold); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const FERIES = {
      2025: ["2025-01-01","2025-04-21","2025-05-01","2025-05-08","2025-05-29","2025-06-09","2025-07-14","2025-08-15","2025-11-01","2025-11-11","2025-12-25"],
      2026: ["2026-01-01","2026-04-06","2026-05-01","2026-05-08","2026-05-14","2026-05-25","2026-07-14","2026-08-15","2026-11-01","2026-11-11","2026-12-25"],
      2027: ["2027-01-01","2027-03-29","2027-05-01","2027-05-06","2027-05-08","2027-05-17","2027-07-14","2027-08-15","2027-11-01","2027-11-11","2027-12-25"],
      2028: ["2028-01-01","2028-04-17","2028-05-01","2028-05-08","2028-05-25","2028-06-05","2028-07-14","2028-08-15","2028-11-01","2028-11-11","2028-12-25"],
      2029: ["2029-01-01","2029-04-02","2029-05-01","2029-05-08","2029-05-10","2029-05-21","2029-07-14","2029-08-15","2029-11-01","2029-11-11","2029-12-25"],
      2030: ["2030-01-01","2030-04-22","2030-05-01","2030-05-08","2030-05-30","2030-06-10","2030-07-14","2030-08-15","2030-11-01","2030-11-11","2030-12-25"],
    };

    // Lundi de Pentecôte par année
    const PENTECOTE = {
      2025: "2025-06-09", 2026: "2026-05-25", 2027: "2027-05-17",
      2028: "2028-06-05", 2029: "2029-05-21", 2030: "2030-06-10",
    };

    const BAREME_DEFAULT_6CV  = { t1: 0.665, t1b: 0.374, t1c: 1457, t2: 0.446 };
    const BAREME_DEFAULT_5CV  = { t1: 0.636, t1b: 0.357, t1c: 1395, t2: 0.427 };

    function baremeKm(km, taux) {
      const { t1, t1b, t1c, t2 } = taux;
      if (km <= 0)     return 0;
      if (km <= 5000)  return km * t1;
      if (km <= 20000) return (km * t1b) + t1c;
      return km * t2;
    }

    function toKey(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }
    function fmt(d) {
      return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;
    }
    function parseLocal(str) {
      const [y,m,d] = str.split("-").map(Number);
      return new Date(y, m-1, d);
    }

    function calcul({ annee, conges, distance, taux, avecTeletravail, pentecoteTravaille }) {
      const feriesBase = new Set(FERIES[annee] || []);
      if (pentecoteTravaille && PENTECOTE[annee]) feriesBase.delete(PENTECOTE[annee]);
      const feries = feriesBase;
      const congesSet = new Set();
      const congesDetail = [];

      for (const { debut, fin } of conges) {
        if (!debut || !fin) { congesDetail.push(0); continue; }
        const cur = parseLocal(debut);
        const end = parseLocal(fin);
        let count = 0;
        while (cur <= end) {
          const key = toKey(cur);
          const dow = cur.getDay();
          if (dow >= 1 && dow <= 5 && !feries.has(key)) count++;
          congesSet.add(key);
          cur.setDate(cur.getDate()+1);
        }
        congesDetail.push(count);
      }

      const jours = [], vendredis = [];
      let congesOuvres = 0;
      const cur = new Date(annee, 0, 1);
      const end = new Date(annee, 11, 31);
      while (cur <= end) {
        const dow = cur.getDay();
        const key = toKey(cur);
        const isOuvre = dow >= 1 && dow <= 5;
        if (isOuvre && !feries.has(key) && !congesSet.has(key)) {
          jours.push(new Date(cur));
          if (dow === 5) vendredis.push(new Date(cur));
        }
        if (isOuvre && !feries.has(key) && congesSet.has(key)) congesOuvres++;
        cur.setDate(cur.getDate()+1);
      }
      const joursPresentiels = avecTeletravail ? jours.length - vendredis.length : jours.length;
      const teletravail = avecTeletravail ? vendredis.length : 0;
      const kmTotal = joursPresentiels * distance;
      const frais = baremeKm(kmTotal, taux);
      const congesOuvresTotal = congesDetail.reduce((a, b) => a + b, 0);
      return {
        travailles: jours.length,
        teletravail,
        presentiel: joursPresentiels,
        km: kmTotal,
        frais: Math.round(frais),
        congesOuvres: congesOuvresTotal,
        congesDetail,
        vendredisListe: vendredis
      };
    }

    const defaultCongesA = [
      { debut: "2025-04-22", fin: "2025-04-25" },
      { debut: "2025-05-27", fin: "2025-05-30" },
      { debut: "2025-07-28", fin: "2025-08-14" },
      { debut: "2025-12-22", fin: "2025-12-26" },
    ];


    // ── Supabase config ──────────────────────────────────────────
    const SB_URL  = "https://avstledmukaegkdgfteb.supabase.co";
    const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2c3RsZWRtdWthZWdrZGdmdGViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTc5NTYsImV4cCI6MjA5Mjg5Mzk1Nn0.uhpKpnXQXMRM1UiWdTSgos7xHOIb5Ka7KxCweE1G0YQ";
    const SB_HEADERS = { "Content-Type": "application/json", "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` };

    async function sbLoad() {
      try {
        const r = await fetch(`${SB_URL}/rest/v1/frais_reels?id=eq.default&select=data`, { headers: SB_HEADERS });
        if (!r.ok) {
          console.warn("Supabase load error:", r.status, await r.text());
          return null;
        }
        const rows = await r.json();
        return rows.length ? rows[0].data : {};
      } catch(e) {
        console.warn("Supabase fetch failed:", e.message);
        return null;
      }
    }

    async function sbSave(data) {
      try {
        const r = await fetch(`${SB_URL}/rest/v1/frais_reels?id=eq.default`, {
          method: "PATCH",
          headers: { ...SB_HEADERS, "Prefer": "return=minimal" },
          body: JSON.stringify({ data, updated_at: new Date().toISOString() })
        });
        if (!r.ok) console.warn("Supabase save error:", r.status, await r.text());
      } catch(e) { console.warn("Supabase save failed:", e.message); }
    }

    // localStorage comme cache local immédiat
    function loadSaved(key, fallback) {
      try {
        const v = localStorage.getItem(key);
        return v ? JSON.parse(v) : fallback;
      } catch(e) { return fallback; }
    }
    function save(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
    }

    // Collecte tout l'état pour Supabase
    function collectAll() {
      const keys = [
        "app_annee","app_tab","app_dark",
        "stonic_distance","stonic_conges","stonic_tt","stonic_taux","stonic_pent",
        "kadjar_distance","kadjar_conges","kadjar_tt","kadjar_taux","kadjar_pent"
      ];
      const data = {};
      keys.forEach(k => {
        try { const v = localStorage.getItem(k); if (v) data[k] = JSON.parse(v); } catch(e) {}
      });
      return data;
    }

    // Restaure tout depuis Supabase dans localStorage
    function restoreAll(data) {
      if (!data) return;
      Object.entries(data).forEach(([k, v]) => {
        try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
      });
    }

    // Debounce pour ne pas flood Supabase
    let sbTimer = null;
    function scheduleSbSave() {
      clearTimeout(sbTimer);
      sbTimer = setTimeout(() => sbSave(collectAll()), 1500);
    }

    function VehiculePanel({ vehicule, annee }) {
      const sk = vehicule.id;
      const [distanceAR, setDistanceAR] = useState(() => loadSaved(`${sk}_distance`, vehicule.distanceDefault));
      const [conges, setConges] = useState(() => loadSaved(`${sk}_conges`, vehicule.congesDefault));
      const [avecTeletravail, setAvecTeletravail] = useState(() => loadSaved(`${sk}_tt`, vehicule.teletravailDefault));
      const [pentecoteTravaille, setPentecoteTravaille] = useState(() => loadSaved(`${sk}_pent`, false));
      const [taux, setTaux] = useState(() => loadSaved(`${sk}_taux`, vehicule.baremeDefault));
      const [result, setResult] = useState(null);
      const [showVendredis, setShowVendredis] = useState(false);
      const [showBareme, setShowBareme] = useState(false);
      const [copied, setCopied] = useState(false);

      function updateTaux(field, val) {
        const v = parseFloat(val.replace(",", "."));
        setTaux(prev => ({ ...prev, [field]: isNaN(v) ? 0 : v }));
      }

      useEffect(() => {
        setResult(calcul({ annee, conges, distance: distanceAR, taux, avecTeletravail, pentecoteTravaille }));
      }, [annee, JSON.stringify(conges), distanceAR, JSON.stringify(taux), avecTeletravail, pentecoteTravaille]);

      useEffect(() => { save(`${sk}_distance`, distanceAR); scheduleSbSave(); }, [distanceAR]);
      useEffect(() => { save(`${sk}_conges`, conges); scheduleSbSave(); }, [JSON.stringify(conges)]);
      useEffect(() => { save(`${sk}_tt`, avecTeletravail); scheduleSbSave(); }, [avecTeletravail]);
      useEffect(() => { save(`${sk}_taux`, taux); scheduleSbSave(); }, [JSON.stringify(taux)]);
      useEffect(() => { save(`${sk}_pent`, pentecoteTravaille); scheduleSbSave(); }, [pentecoteTravaille]);

      // Reset congés quand l'année change
      const prevAnneeRef = React.useRef(annee);
      useEffect(() => {
        if (prevAnneeRef.current !== annee) {
          setConges([]);
          prevAnneeRef.current = annee;
        }
      }, [annee]);

      function addConge() { setConges([...conges, { debut: "", fin: "" }]); }
      function removeConge(i) { setConges(conges.filter((_,idx) => idx !== i)); }
      function updateConge(i, field, val) {
        if (field === "debut") {
          // Pré-remplir la fin avec la date de début si elle est vide
          setConges(conges.map((c,idx) => idx === i ? {...c, debut: val, fin: c.fin || val} : c));
        } else {
          setConges(conges.map((c,idx) => idx === i ? {...c, [field]: val} : c));
        }
      }

      const summary = result ? [
        `${result.travailles} jours travaillés${pentecoteTravaille ? " (dont le lundi de Pentecôte : journée de solidarité)" : ""}`,
        avecTeletravail ? `- ${result.teletravail} jours de télétravail` : null,
        avecTeletravail && vehicule.showPresentiel !== false ? `soit ${result.presentiel} jours en présentiel` : null,
        `distance domicile - travail : ${distanceAR} Kms aller-retour`,
        `soit ${result.presentiel} × ${distanceAR} Kms = ${result.km.toLocaleString("fr-FR")} Kms`,
        `Voiture : ${vehicule.nom}`,
        `Soit ${result.frais.toLocaleString("fr-FR")} €`,
      ].filter(Boolean).join("\n") : "";

      function copier() {
        const txt = summary;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(txt).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
        } else {
          const ta = document.createElement("textarea");
          ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
          setCopied(true); setTimeout(() => setCopied(false), 2000);
        }
      }

      return (
        <div className="animate">
          {/* Distance + Toggle TT */}
          <div className="card">
            <div className="section-title">Paramètres — {vehicule.nom}</div>
            <div style={{marginBottom:12}}>
              <span className="label">Distance A/R (km)</span>
              <input type="number" value={distanceAR} min={2} step={2}
                onChange={e => setDistanceAR(Number(e.target.value))} />
            </div>
            {vehicule.showTeletravail !== false && (
              <div className="toggle-row">
                <span className="toggle-label">Vendredis en télétravail</span>
                <button className={`toggle ${avecTeletravail ? "on" : ""}`}
                  onClick={() => setAvecTeletravail(!avecTeletravail)} />
              </div>
            )}
            <div className="toggle-row">
              <span className="toggle-label">Lundi de Pentecôte travaillé</span>
              <button className={`toggle ${pentecoteTravaille ? "on" : ""}`}
                onClick={() => setPentecoteTravaille(!pentecoteTravaille)} />
            </div>
            <div style={{marginTop:12}}>
              <button className="btn btn-outline" style={{fontSize:12}}
                onClick={() => setShowBareme(!showBareme)}>
                {showBareme ? "▲" : "▼"} Barème {vehicule.cv} — {taux.t1.toString().replace(".","\,")} / {taux.t1b.toString().replace(".","\,")} + {taux.t1c} / {taux.t2.toString().replace(".","\,")}
              </button>
              {showBareme && (
                <div style={{marginTop:12, background:"var(--bg)", borderRadius:10, padding:14}}>
                  <div style={{fontSize:11, color:"var(--gold)", letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:10}}>
                    Taux {vehicule.cv} — à mettre à jour si revalorisé
                  </div>
                  <div className="grid2">
                    <div>
                      <span className="label">≤ 5 000 km (d × x)</span>
                      <input type="text" inputMode="decimal" value={taux.t1.toString().replace(".",",")}
                        onChange={e => updateTaux("t1", e.target.value)} />
                    </div>
                    <div>
                      <span className="label">&gt; 20 000 km (d × x)</span>
                      <input type="text" inputMode="decimal" value={taux.t2.toString().replace(".",",")}
                        onChange={e => updateTaux("t2", e.target.value)} />
                    </div>
                    <div>
                      <span className="label">5 001–20 000 km (d × x)</span>
                      <input type="text" inputMode="decimal" value={taux.t1b.toString().replace(".",",")}
                        onChange={e => updateTaux("t1b", e.target.value)} />
                    </div>
                    <div>
                      <span className="label">5 001–20 000 km (+ x)</span>
                      <input type="text" inputMode="decimal" value={taux.t1c.toString().replace(".",",")}
                        onChange={e => updateTaux("t1c", e.target.value)} />
                    </div>
                  </div>
                  <button className="btn btn-outline" style={{marginTop:10, fontSize:12}}
                    onClick={() => setTaux(vehicule.baremeDefault)}>
                    ↺ Réinitialiser aux taux officiels
                  </button>
                  <div style={{marginTop:8, fontSize:11, color:"var(--footer)", textAlign:"center"}}>
                    <a href="https://www.impots.gouv.fr/simulateur-bareme-kilometrique"
                      target="_blank" rel="noopener noreferrer"
                      style={{color:"var(--gold)", textDecoration:"none"}}>
                      Vérifier sur impots.gouv.fr ↗
                    </a>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Congés */}
          <div className="card">
            <div className="section-title">Périodes de congés</div>

                  <div>

                  <button className="btn-danger" onClick={() => removeConge(i)} style={{marginTop: i===0?18:0}}>✕</button>

                  </div>
                )}
              </div>
